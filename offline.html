<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; form-action 'self'; base-uri 'self';">
<title>Stammbaum — Offline</title>
<style>
  :root {
    --bg:       #18140f;
    --surface:  #211c14;
    --gold:     #c8a84a;
    --gold-dim: #7a6328;
    --text:     #f2e8d4;
    --text-dim: #a0906e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    text-align: center; padding: 48px 36px;
    background: var(--surface); border-radius: 16px;
    border: 1px solid var(--gold-dim); max-width: 320px; width: 90%;
  }
  .ornament { color: var(--gold-dim); letter-spacing: 0.4em; font-size: 1.1rem; margin-bottom: 20px; }
  h1 { font-size: 1.5rem; color: var(--text); margin-bottom: 6px; }
  p  { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 28px; }
  a.btn {
    display: inline-block; padding: 10px 28px;
    border: 1px solid var(--gold-dim); border-radius: 8px;
    color: var(--gold); text-decoration: none;
    font-size: 0.95rem; letter-spacing: 0.03em;
  }
  a.btn:active { background: var(--gold-dim); color: var(--bg); }
</style>
</head>
<body>
<div class="card">
  <div class="ornament">✦  ✦  ✦</div>
  <h1>Stammbaum</h1>
  <p>Keine Verbindung.<br>Bitte Netz pruefen und erneut versuchen.</p>
  <a class="btn" href="./">Erneut versuchen</a>
</div>
</body>
</html>
