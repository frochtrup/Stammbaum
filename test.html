<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stammbaum — GEDCOM Roundtrip Test</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 14px;
    background: #1a1a1a;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px;
  }

  h1 { font-size: 1.2rem; font-weight: 600; color: #c8a84a; margin-bottom: 4px; }
  .subtitle { font-size: 0.8rem; color: #888; margin-bottom: 24px; }

  #drop-zone {
    border: 2px dashed #444;
    border-radius: 8px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 24px;
  }
  #drop-zone.drag-over { border-color: #c8a84a; background: rgba(200,168,74,0.06); }
  #drop-zone p { color: #888; margin-bottom: 8px; }
  #drop-zone strong { color: #ccc; }
  #file-input { display: none; }

  .btn {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 4px;
    border: 1px solid #555;
    background: #2a2a2a;
    color: #ccc;
    cursor: pointer;
    font-size: 13px;
    margin-top: 8px;
  }
  .btn:hover { border-color: #c8a84a; color: #c8a84a; }

  #results { display: none; }
  .results-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
  }
  #summary {
    font-size: 0.85rem;
    color: #888;
  }
  #summary .pass { color: #5c9e5c; font-weight: 600; }
  #summary .fail { color: #c05050; font-weight: 600; }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    font-size: 0.75rem;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 6px 10px;
    border-bottom: 1px solid #333;
  }
  td {
    padding: 8px 10px;
    border-bottom: 1px solid #2a2a2a;
    vertical-align: top;
  }
  tr:hover td { background: #222; }

  .status-ok  { color: #5c9e5c; font-weight: 600; }
  .status-err { color: #c05050; font-weight: 600; }
  .status-run { color: #888; }

  .delta-zero { color: #5c9e5c; }
  .delta-pos  { color: #c8a84a; }
  .delta-neg  { color: #c05050; }

  .filename { font-family: monospace; font-size: 13px; }
  .num { font-variant-numeric: tabular-nums; color: #bbb; }
  .time-col { color: #666; font-size: 12px; }

  .diff-toggle {
    font-size: 11px;
    color: #c8a84a;
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    padding: 0;
    margin-left: 6px;
  }
  .diff-block {
    display: none;
    margin-top: 8px;
    padding: 10px;
    background: #111;
    border-radius: 4px;
    font-family: monospace;
    font-size: 11px;
    white-space: pre-wrap;
    color: #bbb;
    max-height: 300px;
    overflow-y: auto;
  }
  .diff-block .d-out1 { color: #c05050; }
  .diff-block .d-out2 { color: #5c9e5c; }
  .diff-block .d-head { color: #888; font-style: italic; }

  #clear-btn { margin-left: auto; }
</style>
</head>
<body>

<h1>GEDCOM Roundtrip Test</h1>
<p class="subtitle">parse → write → parse → write · out1 === out2 · Nur gedcom.js + gedcom-parser.js + gedcom-writer.js geladen</p>

<div id="drop-zone">
  <p><strong>Eine oder mehrere .ged-Dateien</strong></p>
  <p>hierher ziehen oder</p>
  <label class="btn" for="file-input">Dateien auswählen</label>
  <input type="file" id="file-input" accept=".ged,.GED,text/plain" multiple>
</div>

<div id="results">
  <div class="results-header">
    <div id="summary"></div>
    <button class="btn" id="clear-btn">Zurücksetzen</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>Datei</th>
        <th>Pers.</th>
        <th>Fam.</th>
        <th>Quellen</th>
        <th>net_delta</th>
        <th>Stabil</th>
        <th>Zeit</th>
      </tr>
    </thead>
    <tbody id="results-body"></tbody>
  </table>
</div>

<script src="gedcom.js"></script>
<script src="gedcom-parser.js"></script>
<script src="gedcom-writer.js"></script>
<script>

const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const resultsEl = document.getElementById('results');
const tbody     = document.getElementById('results-body');
const summaryEl = document.getElementById('summary');

let _passCount = 0;
let _failCount = 0;

// ── Drag & Drop ──────────────────────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  processFiles([...e.dataTransfer.files]);
});
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { processFiles([...fileInput.files]); fileInput.value = ''; });
document.getElementById('clear-btn').addEventListener('click', () => {
  tbody.innerHTML = '';
  resultsEl.style.display = 'none';
  _passCount = 0;
  _failCount = 0;
});

// ── File Queue ────────────────────────────────────────────────
async function processFiles(files) {
  const gedFiles = files.filter(f => /\.(ged|GED)$/i.test(f.name) || f.type === 'text/plain');
  if (!gedFiles.length) return;
  resultsEl.style.display = 'block';
  for (const f of gedFiles) {
    const row = addPendingRow(f.name);
    const result = await runTest(f);
    updateRow(row, result);
    if (result.stable) _passCount++; else _failCount++;
    updateSummary();
  }
}

// ── Core Test ─────────────────────────────────────────────────
async function runTest(file) {
  const text = await file.text();
  const t0 = performance.now();

  // Round 1
  const errs1 = [];
  const db1 = parseGEDCOM(text, errs1);
  setDb(db1);
  const out1 = writeGEDCOM(false);

  // Round 2
  const errs2 = [];
  const db2 = parseGEDCOM(out1, errs2);
  setDb(db2);
  const out2 = writeGEDCOM(false);

  const t1 = performance.now();
  const stable   = out1 === out2;
  const inLines  = text.split('\n').length;
  const outLines = out1.split('\n').length;

  return {
    name:     file.name,
    persons:  Object.keys(db1.individuals || {}).length,
    families: Object.keys(db1.families    || {}).length,
    sources:  Object.keys(db1.sources     || {}).length,
    stable,
    delta:    outLines - inLines,
    time:     Math.round(t1 - t0),
    errs1:    errs1.length,
    errs2:    errs2.length,
    diff:     stable ? null : firstDiffs(out1, out2, 20),
  };
}

function firstDiffs(a, b, max) {
  const la = a.split('\n');
  const lb = b.split('\n');
  const out = [];
  const len = Math.max(la.length, lb.length);
  let found = 0;
  for (let i = 0; i < len && found < max; i++) {
    if (la[i] !== lb[i]) {
      out.push({ line: i + 1, a: la[i] ?? '<fehlt>', b: lb[i] ?? '<fehlt>' });
      found++;
    }
  }
  return out;
}

// ── DOM ───────────────────────────────────────────────────────
function addPendingRow(name) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="filename">${esc(name)}</td>
    <td colspan="6" class="status-run">läuft…</td>
  `;
  tbody.appendChild(tr);
  return tr;
}

function updateRow(tr, r) {
  const deltaClass = r.delta === 0 ? 'delta-zero' : (r.delta > 0 ? 'delta-pos' : 'delta-neg');
  const deltaStr   = r.delta === 0 ? '0' : (r.delta > 0 ? '+' + r.delta : String(r.delta));
  const statusHtml = r.stable
    ? `<span class="status-ok">✓</span>`
    : `<span class="status-err">✗</span><button class="diff-toggle" onclick="toggleDiff(this)">diff</button>`;

  let errNote = '';
  if (r.errs1 > 0) errNote += ` <span style="color:#c8a84a" title="Parse-Fehler Runde 1">(${r.errs1} Warn.)</span>`;

  tr.innerHTML = `
    <td>
      <span class="filename">${esc(r.name)}</span>${errNote}
      ${r.diff ? `<div class="diff-block">${buildDiffHtml(r.diff)}</div>` : ''}
    </td>
    <td class="num">${r.persons}</td>
    <td class="num">${r.families}</td>
    <td class="num">${r.sources}</td>
    <td class="${deltaClass}">${deltaStr}</td>
    <td>${statusHtml}</td>
    <td class="time-col">${r.time} ms</td>
  `;
}

function buildDiffHtml(diffs) {
  return diffs.map(d =>
    `<span class="d-head">Zeile ${d.line}:</span>\n` +
    `<span class="d-out1">− ${esc(d.a)}</span>\n` +
    `<span class="d-out2">+ ${esc(d.b)}</span>\n`
  ).join('\n');
}

function toggleDiff(btn) {
  const block = btn.closest('td').querySelector('.diff-block');
  if (!block) return;
  const open = block.style.display === 'block';
  block.style.display = open ? 'none' : 'block';
  btn.textContent = open ? 'diff' : 'schließen';
}

function updateSummary() {
  const total = _passCount + _failCount;
  summaryEl.innerHTML =
    `${total} Datei${total !== 1 ? 'en' : ''} · ` +
    `<span class="pass">${_passCount} stabil</span>` +
    (_failCount ? ` · <span class="fail">${_failCount} instabil</span>` : '');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

</script>
</body>
</html>
